name: product-discovery
version: 1.1.0
author: channel3
description: >
  Search for real product data — prices, availability, merchant links, and
  "more like this" recommendations — across thousands of retailers using bundled
  shell scripts (search.sh, similar.sh, categories.sh, brands.sh).
  Use when finding products, comparing prices, checking availability, or
  resolving category slugs and brand IDs for strict filtering.
license: MIT

permissions:
  - network
  - shell

config:
  CHANNEL3_API_KEY:
    type: string
    required: true
    description: "Channel3 API key — get one free at https://trychannel3.com"
    secret: true

entryPoint:
  type: shell
  path: scripts/search.sh
